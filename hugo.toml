# ATLAS 정적 사이트 설정
# baseURL은 Cloudflare Pages 배포 후 실제 주소로 바꾸세요 (끝에 / 유지)
baseURL = "https://example.pages.dev/"
languageCode = "ko-kr"
defaultContentLanguage = "ko"
title = "파워스테이션 가이드"        # ← 사이트 이름. 원하는 이름으로 변경
enableRobotsTXT = true
enableEmoji = true
summaryLength = 30

[markup.goldmark.renderer]
  unsafe = true                     # ★ 본문 내 JSON-LD <script> 렌더링에 필수. 끄지 말 것

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3

[params]
  description = "데이터 기반 휴대용 파워스테이션 비교·추천 가이드"
  author = "Editorial Team"

[taxonomies]
  tag = "tags"
