{{ define "main" }}
<div class="home-head">
  <h1 class="home-title">{{ .Title }}</h1>
  {{ with .Description }}<p class="home-desc">{{ . }}</p>{{ end }}
  <div class="home-rule"></div>
</div>
<ul class="post-list">
  {{ range .Pages.ByDate.Reverse }}
  <li class="post-card">
    <a class="tt" href="{{ .Permalink }}">{{ .Title }}</a>
    {{ with .Description }}<p class="excerpt">{{ . }}</p>{{ end }}
    <span class="date">{{ .Date.Format "2006.01.02" }}</span>
  </li>
  {{ end }}
</ul>
{{ end }}
